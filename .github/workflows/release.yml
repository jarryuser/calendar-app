name: Release

# Triggers on git tags like v1.0.0
# To release: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            name: macOS (Apple Silicon)
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            name: macOS (Intel)
          - platform: ubuntu-22.04
            args: ''
            name: Linux
          - platform: windows-latest
            args: ''
            name: Windows

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Calendar ${{ github.ref_name }}'
          releaseBody: |
            ## Download

            | Platform | File |
            |---|---|
            | macOS (Apple Silicon M1/M2/M3) | `Calendar_*_aarch64.dmg` |
            | macOS (Intel) | `Calendar_*_x64.dmg` |
            | Windows | `Calendar_*_x64-setup.exe` |
            | Linux (AppImage) | `Calendar_*_amd64.AppImage` |
            | Linux (deb) | `Calendar_*_amd64.deb` |

            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for what changed.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
